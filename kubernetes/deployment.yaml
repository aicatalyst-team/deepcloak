apiVersion: apps/v1
kind: Deployment
metadata:
  name: deepcloak
  namespace: poc-deepcloak
  labels:
    app: deepcloak
    autopoc.io/project: deepcloak
spec:
  replicas: 1
  selector:
    matchLabels:
      app: deepcloak
  template:
    metadata:
      labels:
        app: deepcloak
    spec:
      containers:
        - name: deepcloak
          image: quay.io/aicatalyst/deepcloak:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
