<head><title>Why is the sky blue? — Example</title></head>
<body>
<article>
  <h1>Why is the sky blue?</h1>
  <p>The sky appears blue because molecules in the air scatter blue light from the
  sun more than they scatter red light. This is called Rayleigh scattering.</p>
</article>
